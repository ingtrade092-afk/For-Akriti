<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmol ❤️ Akriti</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#ff4fd8,#7a5cff);
  color:white;
  min-height:100vh;
  text-align:center;
}

.container{
  padding:20px;
}

.box{
  background:rgba(255,255,255,0.15);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  max-width:800px;
  margin:20px auto;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  width:250px;
  margin:5px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:10px;
  background:white;
  color:#ff4fd8;
  font-weight:bold;
}

.countdown{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.time{
  background:white;
  color:#ff4fd8;
  padding:15px;
  border-radius:15px;
}

.message{
  font-size:1.5rem;
  margin-top:20px;
  min-height:40px;
}

.hidden{
  display:none;
}

iframe{
  margin-top:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>💜 Anmol ❤️ Akriti 💜</h1>
<p>Forever starts here...</p>

<!-- SETUP -->
<div class="box" id="setupBox">
  <h2>Enter Details ❤️</h2>
  
  <input type="datetime-local" id="dateInput"><br>
  <input placeholder="Paste YouTube Song Link" id="https://youtube.com/shorts/7nU5h4_91ss?si=108ZkK39ragg1I0t"><br>

  <button onclick="start()">Start 💖</button>
</div>

<!-- MAIN -->
<div class="box hidden" id="mainBox">

<h2>⏳ Countdown to Our Meeting</h2>

<div class="countdown">
  <div class="time"><span id="d">0</span><br>Days</div>
  <div class="time"><span id="h">0</span><br>Hours</div>
  <div class="time"><span id="m">0</span><br>Min</div>
  <div class="time"><span id="s">0</span><br>Sec</div>
</div>

<div class="message" id="msg"></div>

<!-- YOUTUBE PLAYER -->
<div id="player"></div>

</div>

</div>

<script>

/* ❤️ MESSAGES */
let messages = [
"I Love You ❤️",
"You are my world 💜",
"I miss you 🥺",
"You are my forever ❤️",
"Only you & me 💞"
];

let msgIndex = 0;
let typingInterval;
let interval;
let targetDate;

/* START */
function start(){
  let dateVal = document.getElementById("dateInput").value;
  let yt = document.getElementById("ytLink").value;

  if(!dateVal) return;

  targetDate = new Date(dateVal);

  /* YOUTUBE LINK PROCESS */
  let videoId = "";

  if(yt.includes("watch?v=")){
    videoId = yt.split("watch?v=")[1].split("&")[0];
  } 
  else if(yt.includes("youtu.be/")){
    videoId = yt.split("youtu.be/")[1];
  }

  if(videoId){
    document.getElementById("player").innerHTML = `
      <iframe width="300" height="170"
      src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}"
      allow="autoplay"></iframe>
    `;
  }

  document.getElementById("setupBox").classList.add("hidden");
  document.getElementById("mainBox").classList.remove("hidden");

  startCountdown();
}

/* TYPING FIXED */
function typeText(text){
  clearInterval(typingInterval);

  let i = 0;
  let el = document.getElementById("msg");
  el.innerText = "";

  typingInterval = setInterval(()=>{
    el.innerText += text[i];
    i++;
    if(i >= text.length){
      clearInterval(typingInterval);
    }
  },50);
}

/* COUNTDOWN */
function startCountdown(){
  interval = setInterval(()=>{
    let now = new Date().getTime();
    let dist = targetDate - now;

    if(dist <= 0){
      document.body.innerHTML = `
      <h1 style="margin-top:30vh;">💖 Finally Together ❤️</h1>
      `;
      clearInterval(interval);
      return;
    }

    document.getElementById("d").innerText =
      Math.floor(dist/(1000*60*60*24));

    document.getElementById("h").innerText =
      Math.floor((dist%(1000*60*60*24))/(1000*60*60));

    document.getElementById("m").innerText =
      Math.floor((dist%(1000*60*60))/(1000*60));

    document.getElementById("s").innerText =
      Math.floor((dist%(1000*60))/1000);

    typeText(messages[msgIndex++ % messages.length]);

  },1000);
}

</script>

</body>
</html>
