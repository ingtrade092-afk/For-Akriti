<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anmol ❤️ Akriti</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff4fd8,#7a5cff);
  color:white;
  text-align:center;
}

.container{
  margin-top:60px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff4fd8;
  font-weight:bold;
  cursor:pointer;
  margin:10px;
}

#countdown{
  font-size:30px;
  margin-top:20px;
}

#msg{
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>💜 Anmol ❤️ Akriti 💜</h1>

<button onclick="openForm()">💌 Enter Our Meeting Date</button>

<h2>⏳ Countdown</h2>
<div id="countdown">Waiting for Akriti 💖</div>

<div id="msg">I Love You ❤️</div>

</div>

<script>

const FORM_LINK = "https://docs.google.com/forms/d/e/1FAIpQLSfMNpEa4K0tIDZ04kEg68WK4yFjLxikC80dXxduPwJM7bDESw/viewform?usp=sharing&ouid=106823344659274536521";

// 🔥 PASTE YOUR APPS SCRIPT URL HERE
const API_URL = "PASTE_YOUR_SCRIPT_URL_HERE";

function openForm(){
  window.open(FORM_LINK, "_blank");
}

function fetchData(){
  fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    if(data.date){
      if(!localStorage.getItem("locked")){
        localStorage.setItem("date", data.date);
        localStorage.setItem("locked","yes");
      }
    }

  }).catch(()=>{});
}

function updateCountdown(){

  let date = localStorage.getItem("date");

  if(!date){
    document.getElementById("countdown").innerText =
    "Waiting for Akriti to enter date 💖";
    return;
  }

  let target = new Date(date).getTime();
  let now = new Date().getTime();
  let diff = target - now;

  if(diff <= 0){
    document.getElementById("countdown").innerHTML =
    "💖 See You Soon My Love ❤️";
    return;
  }

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerText =
  `${d}d ${h}h ${m}m ${s}s ❤️`;

  let msgs = ["I Love You bauaa ❤️","Miss You 🥺","Forever Us 💜","You are my world ❤️"];
  document.getElementById("msg").innerText =
  msgs[Math.floor(Math.random()*msgs.length)];
}

setInterval(fetchData,5000);
setInterval(updateCountdown,1000);

fetchData();

</script>

</body>
</html>
